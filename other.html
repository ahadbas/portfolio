<head>

    <link rel="stylesheet" href="project-page.css">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

<body>
    <div class="main main--project">
        <header class="site-header">
            <p><a href="./">Ahad Basravi</a></p>
        </header>
        <h1>Other</h1>

        <article class="project-page">
            <section class="row project-carousel">
                <div class="left-column">
                    <header class="meta">
                        <span class="meta__index">01</span>
                        <p class="meta__line">Photography</p>
                        <p class="meta__line">Various</p>
                        <p class="meta__line">Ongoing</p>
                    </header>
                    <p class="description">
                        More projects coming soon
                    </p>
                </div>
                <div class="right-column">
                    <div class="project-carousel__sizer" aria-hidden="true"></div>
                    <div class="media-container media-container--carousel">
                        <div
                            class="media-carousel"
                            role="region"
                            aria-roledescription="carousel"
                            aria-label="Photography — horizontal image strip, scroll or swipe to pan"
                            tabindex="0"
                        >
                            <div class="project-carousel__spacer" aria-hidden="true"></div>
                            <div class="media-carousel__slide" aria-label="1 of 3">
                                <img
                                    class="media"
                                    src="images/photo_lambo_01.jpg"
                                    alt="Photography 1 of 3 — Lamborghini"
                                    loading="lazy"
                                    decoding="async"
                                    draggable="false"
                                />
                            </div>
                            <div class="media-carousel__slide" aria-label="2 of 3">
                                <img
                                    class="media"
                                    src="images/photography/OSAKA_AIR.JPG"
                                    alt="Photography 2 of 3 — Osaka air"
                                    loading="lazy"
                                    decoding="async"
                                    draggable="false"
                                />
                            </div>
                            <div class="media-carousel__slide" aria-label="3 of 3">
                                <img
                                    class="media"
                                    src="images/photography/BLUR_FINAL.jpg"
                                    alt="Photography 3 of 3 — Blur"
                                    loading="lazy"
                                    decoding="async"
                                    draggable="false"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="row">
                <div class="left-column">
                    <header class="meta">
                        <span class="meta__index">02</span>
                        <p class="meta__line">PLACEHOLDER</p>
                        <p class="meta__line">PROJECT TWO</p>
                        <p class="meta__line">TBD</p>
                    </header>
                    <p class="description">
                        Placeholder project — replace title, copy, and image when ready.
                    </p>
                </div>
                <div class="right-column">
                    <div class="media-container">
                        <img class="media" src="images/work_avokado_rull.png" alt="Placeholder project two" />
                    </div>
                </div>
            </section>

            <section class="row">
                <div class="left-column">
                    <header class="meta">
                        <span class="meta__index">03</span>
                        <p class="meta__line">PLACEHOLDER</p>

                    <p class="description">
                        Placeholder project — replace title, copy, and image when ready.

                <div class="right-column">

                        <img class="media" src="images/work_avokado_rull.png" alt="Placeholder project three" />
                    </div>
                </div>
            </section>
        </article>
    </div>
    <script src="project-carousel.js" defer></script>
